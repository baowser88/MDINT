
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .page { padding: 2.5rem 1.5rem; max-width: 520px; margin: 0 auto; }
  .title { font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 2rem; }
  .doc-card {
    display: flex; align-items: center; gap: 16px;
    padding: 1rem 1.25rem;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    background: var(--color-background-primary);
    text-decoration: none;
    margin-bottom: 10px;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .doc-card:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .doc-card:active { transform: scale(0.99); }
  .icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; flex-shrink: 0;
  }
  .icon-docx { background: #D4E8F5; color: #0C447C; }
  .icon-pdf  { background: #FAECE7; color: #993C1D; }
  .doc-info { flex: 1; }
  .doc-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .doc-type { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .arrow { font-size: 16px; color: var(--color-text-secondary); }
  .footer { margin-top: 2rem; font-size: 12px; color: var(--color-text-secondary); text-align: center; }
</style>

<div class="page">
  <p class="title">My documents</p>

  <a class="doc-card" href="consult.docx" target="_blank">
    <div class="icon icon-docx">DOC</div>
    <div class="doc-info">
      <div class="doc-name">Consultation</div>
      </div>
    <span class="arrow">↓</span>
  </a>

  <a class="doc-card" href="note externe.docx" target="_blank">
    <div class="icon icon-docx">DOC</div>
    <div class="doc-info">
      <div class="doc-name">Clinique externe</div>
      </div>
    <span class="arrow">↓</span>
  </a>

 <a class="doc-card" href="note evol.docx" target="_blank">
    <div class="icon icon-docx">DOC</div>
    <div class="doc-info">
      <div class="doc-name">Notes d'évolution</div>
      </div>
    <span class="arrow">↓</span>
  </a>
 
  <a class="doc-card" href="labo.pdf" target="_blank">
    <div class="icon icon-pdf">PDF</div>
    <div class="doc-info">
      <div class="doc-name">Labo</div>
      </div>
    <span class="arrow">↓</span>
  </a>

  <p class="footer">Click any file to open or download it directly.</p>
</div>
